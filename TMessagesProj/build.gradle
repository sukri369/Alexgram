import java.nio.file.Paths
import org.gradle.internal.os.OperatingSystem

plugins {
    id 'com.android.application'
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    id 'com.google.dagger.hilt.android'
    id 'com.google.devtools.ksp'
    id 'org.jetbrains.kotlin.plugin.compose'
}

def buildTimestamp = System.getenv('BUILD_TIMESTAMP') ?: '0'
def commitId = System.getenv('COMMIT_ID')
def verName = "${APP_VERSION_NAME}${commitId?.take(7) ? "-${commitId.take(7)}" : ''}"
def verCode = 1249

def officialVer = APP_VERSION_NAME
def officialCode = APP_VERSION_CODE

def keystorePwd = null
def alias = null
def pwd = null

Properties properties
def base64 = System.getenv('LOCAL_PROPERTIES')
if (base64 != null && !base64.isBlank()) {
    properties = new Properties()
    properties.load(new ByteArrayInputStream(Base64.decoder.decode(base64)))
} else if (project.rootProject.file('local.properties').exists()) {
    properties = new Properties()
    properties.load(project.rootProject.file('local.properties').newDataInputStream())
}

if (properties != null) {
    keystorePwd = properties.getProperty('KEYSTORE_PASS')
    alias = properties.getProperty('ALIAS_NAME')
    pwd = properties.getProperty('ALIAS_PASS')
}

// Ensure defaults for build if not set
keystorePwd = keystorePwd ?: System.getenv('KEYSTORE_PASS') ?: "123456"
alias = alias ?: System.getenv('ALIAS_NAME') ?: "key0"
pwd = pwd ?: System.getenv('ALIAS_PASS') ?: "123456"

def nativeTarget = System.getenv('NATIVE_TARGET') ?: ''

if (nativeTarget == 'SKIP') {
    tasks.configureEach { task ->
        if (
            task.name.toLowerCase().contains('cmake') ||
            task.name.toLowerCase().contains('jni') ||
            task.name.toLowerCase().contains('test')
        ) {
            task.enabled = false
        }
    }
}

android {
    kotlin {
        compilerOptions {
            jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_21
        }
    }

    defaultConfig.applicationId = APP_PACKAGE

    packaging {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    splits {
        abi {
            enable = true
            reset()
            universalApk = false
            if (!nativeTarget.isBlank()) {
                include nativeTarget
            } else {
                include 'arm64-v8a', 'x86_64'
            }
        }
    }

    defaultConfig {
        versionName verName
        versionCode verCode

        // obtain your own keys at https://core.telegram.org/api/obtaining_api_id
        def appId = '25830228'
        def appHash = 'a23a5133bddbdab87df3df06ccf63a89'

        if (properties != null) {
            appId = properties.getProperty('TELEGRAM_APP_ID') ?: System.getenv('TELEGRAM_APP_ID') ?: appId
            appHash = properties.getProperty('TELEGRAM_APP_HASH') ?: System.getenv('TELEGRAM_APP_HASH') ?: appHash
        }

        buildConfigField 'String', 'BUILD_VERSION_STRING', '"' + verName + '"'
        buildConfigField 'String', 'OFFICIAL_VERSION', '"' + officialVer + '"'
        buildConfigField 'int', 'OFFICIAL_VERSION_CODE', officialCode + ''
        buildConfigField 'int', 'APP_ID', appId
        buildConfigField 'String', 'APP_HASH', '"' + appHash + '"'
        buildConfigField 'long', 'BUILD_TIMESTAMP', buildTimestamp + 'L'

        externalNativeBuild {
            cmake {
                arguments '-DANDROID_STL=c++_static', '-DANDROID_PLATFORM=android-27', '-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON'
                System.getenv('PATH').split(File.pathSeparator).any { path ->
                    var file = Paths.get("${path}${File.separator}ccache${if (OperatingSystem.current().windows) ".exe" else ""}").toFile()
                    if (file.exists()) {
                        println("Using ccache ${file.getAbsolutePath()}")
                        arguments += "-DANDROID_CCACHE=${file.getAbsolutePath()}"
                        return true
                    }
                }
            }
        }

        javaCompileOptions {
            annotationProcessorOptions {
                arguments += ['room.schemaLocation': "$projectDir/schemas".toString()]
            }
        }

        buildFeatures {
            compose = true
        }
    }

    bundle {
        language {
            enableSplit = false
        }
    }

    externalNativeBuild {
        cmake {
            version = '3.31.6+'
            path = 'jni/CMakeLists.txt'
        }
    }

    signingConfigs {
        release {
            storeFile project.file('release.keystore')
            storePassword keystorePwd
            keyAlias alias
            keyPassword pwd
        }
    }

    buildTypes {
        debug {
            isDefault = true
            debuggable = true
            jniDebuggable = true
            multiDexEnabled = true
            signingConfig = signingConfigs.release
        }

        staging {
            debuggable = false
            jniDebuggable = false
            minifyEnabled = true
            shrinkResources = true
            multiDexEnabled = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            matchingFallbacks = ['release', 'staging', 'debug']
            signingConfig = signingConfigs.release
        }

        release {
            debuggable = false
            jniDebuggable = false
            minifyEnabled = true
            shrinkResources = true
            multiDexEnabled = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            matchingFallbacks = ['release', 'staging', 'debug']
            signingConfig = signingConfigs.release
        }
    }

    sourceSets.main.jniLibs.srcDirs = ['./jni/']

    namespace = 'org.telegram.messenger'
}

androidComponents {
    onVariants(selector().all()) { variant ->
        variant.outputs.forEach { output ->
            String gramName = 'Alexgram'
            String first = String.format('%s-v%s(%s)', gramName, verName, verCode)
            output.outputFileName.set(
                output.outputFileName.get()
                    .replace('TMessagesProj', first)
                    .replace('-release', '')
                    .replace('-staging', '')
            )
        }
    }
}

configurations.configureEach {
    exclude group: 'androidx.recyclerview', module: 'recyclerview'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
}

dependencies {
    // official
    implementation 'androidx.core:core-ktx:1.17.0' // 1.10.1
    implementation 'androidx.palette:palette-ktx:1.0.0'
    implementation 'androidx.exifinterface:exifinterface:1.4.2' // 1.3.6
    implementation 'androidx.dynamicanimation:dynamicanimation:1.0.0'
    implementation 'androidx.mediarouter:mediarouter:1.8.0'
    implementation 'androidx.sharetarget:sharetarget:1.2.0'
    implementation 'androidx.interpolator:interpolator:1.0.0'
    implementation 'androidx.biometric:biometric:1.1.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation 'org.nanohttpd:nanohttpd:2.3.1'
    compileOnly 'org.checkerframework:checker-qual:2.5.2'
    compileOnly 'org.checkerframework:checker-compat-qual:2.5.0'
    implementation 'com.google.firebase:firebase-messaging:25.0.1' // 22.0.0
    implementation 'com.google.firebase:firebase-crashlytics:20.0.4'
    implementation 'com.google.android.gms:play-services-cast-framework:22.2.0' // 21.4.0
    implementation 'com.google.android.gms:play-services-maps:20.0.0' // 18.1.0
    implementation 'com.google.android.gms:play-services-auth:21.4.0' // 20.4.0
    implementation 'com.google.android.gms:play-services-vision:20.1.3'
    implementation 'com.google.android.gms:play-services-location:21.3.0'
    implementation 'com.googlecode.mp4parser:isoparser:1.0.6'
    implementation 'com.google.mlkit:language-id:17.0.6'
    implementation 'com.google.code.gson:gson:2.13.2'
    implementation ('com.google.guava:guava:33.5.0-android') { // 31.1
        exclude group: 'com.google.code.findbugs', module: 'jsr305'
        exclude group: 'org.checkerframework', module: 'checker-compat-qual'
        exclude group: 'org.checkerframework', module: 'checker-qual'
        exclude group: 'com.google.errorprone', module: 'error_prone_annotations'
        exclude group: 'org.codehaus.mojo', module: 'animal-sniffer-annotations'
    }
    implementation 'com.google.android.gms:play-services-mlkit-subject-segmentation:16.0.0-beta1'
    implementation 'com.google.android.gms:play-services-mlkit-image-labeling:16.0.8'
    implementation "androidx.credentials:credentials:1.6.0-alpha04"
    implementation "androidx.credentials:credentials-play-services-auth:1.6.0-alpha04"
    implementation "io.noties.markwon:core:4.6.2"
    implementation "io.noties.markwon:ext-strikethrough:4.6.2"
    implementation "io.noties.markwon:ext-tables:4.6.2"
    implementation "io.noties.markwon:html:4.6.2"
    implementation "io.noties.markwon:inline-parser:4.6.2"
    implementation "io.noties.markwon:ext-latex:4.6.2"
    // payment
    implementation 'com.google.android.gms:play-services-wallet:19.5.0' // 19.1.0
    implementation('com.stripe:stripe-android:2.0.2') {
        exclude group: 'com.android.support', module: 'support-annotations'
    }
    implementation 'com.android.billingclient:billing:7.1.1'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs_nio:2.1.5'

    // kotlin
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.2'
    // utilities
    implementation 'org.osmdroid:osmdroid-android:6.1.20'
    // network
    implementation 'com.squareup.okhttp3:okhttp:5.3.2'
    implementation 'dnsjava:dnsjava:3.6.4'
    // add for emoji
    implementation 'com.jaredrummler:truetypeparser-light:1.0.0'
    // add for UnifiedPush
    implementation 'org.unifiedpush.android:connector:3.2.0'
    // add for save deleted messages
    implementation 'androidx.room:room-runtime:2.8.4'
    annotationProcessor 'androidx.room:room-compiler:2.8.4'
    // add for keep formatting in translations
    implementation 'org.apache.commons:commons-text:1.15.0'
    // translator from nekogram
    implementation 'app.nekogram.translator:translator:1.5.5'

    // Analytics & Control System
    def hilt_version = "2.59.2"
    implementation "com.google.dagger:hilt-android:$hilt_version"
    ksp "com.google.dagger:hilt-compiler:$hilt_version"

    def compose_bom = platform('androidx.compose:compose-bom:2025.02.00')
    implementation compose_bom
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    debugImplementation 'androidx.compose.ui:ui-tooling'
    implementation 'androidx.activity:activity-compose:1.10.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.8.7'
    implementation 'androidx.compose.material:material-icons-extended'

    def room_version = "2.8.4"
    implementation "androidx.room:room-ktx:$room_version"
    ksp "androidx.room:room-compiler:$room_version"

    def work_version = "2.10.0"
    implementation "androidx.work:work-runtime-ktx:$work_version"

    implementation 'com.github.PhilJay:MPAndroidChart:v3.1.0'

    compileOnly fileTree('libs')
}
